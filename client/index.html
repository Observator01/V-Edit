<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: https://api.elevenlabs.io https://api.anthropic.com;">
  <link rel="stylesheet" href="css/style.css">
  <title>V-Edit</title>
</head>
<body>
  <header>
    <span class="logo">V-Edit</span>
    <span id="status" class="status" title="host status">…</span>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="silence">Auto-Cut</button>
    <button class="tab" data-tab="captions" disabled title="v0.2">Captions</button>
    <button class="tab" data-tab="settings">Settings</button>
  </nav>

  <!-- Auto-Cut Silence -->
  <section class="panel active" id="tab-silence">
    <p class="hint">ตัดช่วงเงียบออกจาก sequence ที่เปิดอยู่ ด้วย Silero VAD
      (รักษาคำลงท้ายไทย). ทำงานบน V1+A1 ของ active sequence เท่านั้น.</p>
    <button id="btn-cut" class="primary">Auto-Cut Silence</button>
    <pre id="log" class="log"></pre>
  </section>

  <!-- Settings -->
  <section class="panel" id="tab-settings">
    <label>VAD threshold (0–1)
      <input type="number" id="cfg-threshold" min="0" max="1" step="0.05" value="0.5"></label>
    <label>Min silence (sec)
      <input type="number" id="cfg-minsil" min="0.1" max="3" step="0.05" value="0.4"></label>
    <label>Tail pad — Thai particle guard (sec)
      <input type="number" id="cfg-tailpad" min="0" max="0.6" step="0.05" value="0.25"></label>
    <hr>
    <label>ElevenLabs API key (Scribe — v0.2)
      <input type="password" id="cfg-eleven" placeholder="sk_..."></label>
    <label>Anthropic API key (take-select — v0.3)
      <input type="password" id="cfg-anthropic" placeholder="sk-ant-..."></label>
    <button id="btn-save" class="primary">Save</button>
    <p class="hint">Key เก็บในเครื่องคุณเท่านั้น (local config) — ไม่ส่งไปไหนนอกจาก provider โดยตรง.</p>
  </section>

  <script src="js/CSInterface.js"></script>
  <script src="js/config.js"></script>
  <script src="js/vad.js"></script>
  <script src="js/providers.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
